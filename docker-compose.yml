services:
  odoo:
    image: odoo-custom:18.0
    depends_on:
      - postgres
    ports:
      - "8069:8069"
    env_file:
      - ${PWD}/.env
    environment:
      - HOST=postgres
      - USER=odoo
      - PASSWORD=odoo
    volumes:
      - ./config:/etc/odoo:rw
      - ./src:/mnt/extra-addons:rw
      - filestore:/var/lib/odoo/data/filestore:rw
  postgres:
    image: postgres:15.0
    env_file:
      - ${PWD}/.env
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data/pgdata
volumes:
  postgres-data:
  filestore: